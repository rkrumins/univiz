# ══════════════════════════════════════════════════════════════════════
# Synodic — Full-Stack Docker Compose (Three-Service Architecture)
# ══════════════════════════════════════════════════════════════════════
#
# Architecture:
#   viz-service (8000)  ──proxy──>  aggregation-controlplane (8091)
#                                          │
#                                     Redis Streams
#                                          │
#                                   aggregation-worker (×N)
#
# Quick start (full platform):
#   docker compose up --build
#
# Just infrastructure (for local dev with uvicorn):
#   docker compose up falkordb postgres redis
#
# Scale aggregation workers:
#   docker compose up --scale aggregation-worker=3
#
# With demo data seeding:
#   docker compose --profile seed up --build
#
# Tear down (keep data):
#   docker compose down
#
# Tear down + delete all data:
#   docker compose down -v
# ══════════════════════════════════════════════════════════════════════

name: synodic

services:

  # ── FalkorDB (Graph Database) — pre-loaded with sample data ───────
  falkordb:
    build:
      context: ./data/quickstart
      dockerfile: Dockerfile.falkordb
    restart: unless-stopped
    ports:
      - "${FALKORDB_PORT:-6379}:6379"
      - "${FALKORDB_UI_PORT:-3000}:3000"       # FalkorDB Browser UI
    environment:
      FALKORDB_ARGS: THREAD_COUNT 4
    volumes:
      # FalkorDB's actual data dir is /var/lib/falkordb/data (the image
      # symlinks /data/data → there). Mounting the volume at /data would
      # capture nothing, so runtime graph writes would be lost on every
      # `compose down`.
      - falkordb_data:/var/lib/falkordb/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis (Message Broker) ─────────────────────────────────────────
  # Dedicated Redis 7 for aggregation job dispatch (Redis Streams) and
  # event pub/sub.  Separate from FalkorDB — graph memory must not
  # compete with broker data.  AOF persistence ensures stream durability
  # across restarts.  noeviction policy prevents silent message loss.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── PostgreSQL (Management Database) ──────────────────────────────
  postgres:
    image: postgres:16.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set in .env}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Aggregation Control Plane (Port 8091) ─────────────────────────
  # Owns the aggregation API surface: job lifecycle, scheduling, crash
  # recovery, drift detection.  Dispatches execution to Workers via
  # Redis Streams.  Does NOT run heavy FalkorDB MERGE — that's the
  # Workers.  Uses SHORT FalkorDB timeouts (5s) so the API stays
  # responsive even when the graph provider is slow/down.
  #
  # MUST start before viz-service (creates the aggregation schema) and
  # before workers (they query the schema it owns).
  aggregation-controlplane:
    build:
      context: .
      dockerfile: backend/Dockerfile.controlplane
    ports:
      - "${CONTROLPLANE_PORT:-8091}:8091"
    environment:
      MANAGEMENT_DB_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      AGGREGATION_DISPATCH_MODE: redis

      # FalkorDB access for drift checks, readiness probes, and purge.
      # Short timeout — API responsiveness over completeness.
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: "6379"
      FALKORDB_SOCKET_TIMEOUT: "5"
      FALKORDB_GRAPH_NAME: ${FALKORDB_GRAPH_NAME:-nexus_lineage}

      AGGREGATION_API_PORT: "8091"
      SYNODIC_ROLE: controlplane
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      falkordb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8091/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  # ── Visualization Service (Port 8000) ─────────────────────────────
  # Primary backend: auth, workspaces, graph queries, ontology, views.
  # Aggregation endpoints are proxied to the Control Plane (port 8091).
  # On first boot it runs Alembic migrations, seeds templates, and
  # bootstraps an admin user + default provider/workspace from env.
  viz-service:
    build:
      context: .
      dockerfile: backend/Dockerfile.viz
    ports:
      - "${VIZ_PORT:-8000}:8000"
    environment:
      # Graph provider bootstrap (used if management DB is empty)
      GRAPH_PROVIDER: ${GRAPH_PROVIDER:-falkordb}
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: "6379"
      FALKORDB_GRAPH_NAME: ${FALKORDB_GRAPH_NAME:-nexus_lineage}

      # Management database
      MANAGEMENT_DB_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}

      # Auth — fail fast if secrets aren't set
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in .env}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRY_MINUTES: "${JWT_EXPIRY_MINUTES:-60}"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@synodic.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}

      # Credential encryption (omit for plaintext in dev)
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}

      # Redis (for aggregation event listener — syncs status from CP)
      REDIS_URL: redis://redis:6379/0

      # Aggregation proxy: all 13 aggregation endpoints are forwarded
      # to the Control Plane.  The viz-service does NOT run any
      # aggregation logic locally — no dispatcher, no scheduler, no
      # worker.  Set to 'false' for single-process dev mode.
      AGGREGATION_PROXY_ENABLED: "true"
      AGGREGATION_SERVICE_URL: http://aggregation-controlplane:8091
      SYNODIC_ROLE: web

      # CORS — allow the frontend container + local dev
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3080,http://localhost:5173,http://localhost:3000}

      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Wait for Control Plane to be healthy so the aggregation schema
      # exists and proxy requests don't fail on first boot.
      aggregation-controlplane:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ── Aggregation Worker (Data Plane) ────────────────────────────────
  # Headless batch executor.  Consumes jobs from Redis Streams, runs
  # heavy FalkorDB MERGE operations.  Own connection pools, own circuit
  # breakers.  Provider failures here CANNOT affect the web tier or
  # Control Plane.  No HTTP API — health probe only on port 8090.
  # Scale horizontally: docker compose up --scale aggregation-worker=3
  aggregation-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.aggregation
    environment:
      MANAGEMENT_DB_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0

      # FalkorDB — worker-specific tuning: longer timeouts for heavy
      # MERGE ops, pool sizes auto-scaled from WORKER_CONCURRENCY.
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: "6379"
      FALKORDB_SOCKET_TIMEOUT: "60"

      # Concurrency: max parallel aggregation jobs per worker replica.
      # Pool sizes are auto-computed: graph = concurrency*4+8, redis = concurrency*3+8
      WORKER_CONCURRENCY: "${WORKER_CONCURRENCY:-4}"
      AGGREGATION_JOB_TIMEOUT_SECS: "${AGGREGATION_JOB_TIMEOUT_SECS:-7200}"

      # Per-graph concurrency limit (prevent FalkorDB write lock contention)
      MAX_CONCURRENT_PER_GRAPH: "${MAX_CONCURRENT_PER_GRAPH:-2}"

      SYNODIC_ROLE: worker
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      # Worker must start after Control Plane (schema must exist)
      aggregation-controlplane:
        condition: service_healthy
      falkordb:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Stats Service (Background Poller) ─────────────────────────────
  # Headless refresh loop that keeps per-data-source graph stats
  # (node/edge counts, schema, ontology) fresh in Postgres so the viz
  # service serves cached stats instead of hammering providers on every
  # read. Same isolation model as aggregation-worker: own Postgres
  # session pool (JOBS), own provider registry, own circuit breakers —
  # provider slowness here CANNOT affect the web tier.
  #
  # Architecture: scheduler + XREADGROUP worker + health endpoint,
  # all in one process. Scale horizontally with:
  #   docker compose up -d --scale stats-service=N
  # Per-source Redis SET NX dedup guarantees at-most-one pending poll
  # per data source across replicas.
  stats-service:
    build:
      context: .
      dockerfile: backend/Dockerfile.insights
    environment:
      # Management DB (polling configs + stats cache + data source catalog)
      MANAGEMENT_DB_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}

      # Redis — job stream + dedup keys. Same broker as aggregation.
      REDIS_URL: redis://redis:6379/0

      # Provider bootstrap — only used when a data source's credentials
      # reference env vars (normal path: credentials come from Postgres).
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: "6379"

      # Must match viz-service or stored provider credentials won't decrypt.
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}

      # ── Stats tunables (see .env.example for full docs) ─────────
      STATS_SCHEDULER_TICK_SECS: "${STATS_SCHEDULER_TICK_SECS:-30}"
      STATS_WORKER_CONCURRENCY: "${STATS_WORKER_CONCURRENCY:-2}"
      STATS_MAX_CONCURRENT_PER_GRAPH: "${STATS_MAX_CONCURRENT_PER_GRAPH:-1}"
      STATS_DEFAULT_INTERVAL_SECS: "${STATS_DEFAULT_INTERVAL_SECS:-300}"
      STATS_MIN_INTERVAL_SECS: "${STATS_MIN_INTERVAL_SECS:-60}"
      STATS_MAX_DELIVERY_ATTEMPTS: "${STATS_MAX_DELIVERY_ATTEMPTS:-3}"
      STATS_DRAIN_TIMEOUT_SECS: "${STATS_DRAIN_TIMEOUT_SECS:-60}"
      STATS_HEALTH_PORT: "8092"

      # Size-adaptive poll timeouts (owned by backend/app/config/resilience.py).
      STATS_POLL_TIMEOUT_SECS: "${STATS_POLL_TIMEOUT_SECS:-30}"
      STATS_POLL_TIMEOUT_LARGE_SECS: "${STATS_POLL_TIMEOUT_LARGE_SECS:-600}"
      STATS_POLL_LARGE_THRESHOLD: "${STATS_POLL_LARGE_THRESHOLD:-100000}"

      SYNODIC_ROLE: stats
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      falkordb:
        condition: service_healthy
      # Controlplane runs Alembic — ensures polling_config / stats tables exist.
      aggregation-controlplane:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8092/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Graph Service (Port 8001) ─────────────────────────────────────
  # Stateless: provider discovery & connectivity testing.
  # No DB access — takes connection params in request body.
  graph-service:
    build:
      context: .
      dockerfile: backend/Dockerfile.graph
    ports:
      - "${GRAPH_PORT:-8001}:8001"
    environment:
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: "6379"
    depends_on:
      falkordb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  # ── Frontend (Nginx + React SPA) ──────────────────────────────────
  # Serves the built React app and reverse-proxies /api/* and /graph/*
  # to the backend services.
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT:-3080}:80"
    depends_on:
      viz-service:
        condition: service_healthy
      graph-service:
        condition: service_healthy
    restart: unless-stopped

  # ── Demo Data Seeder (one-shot, opt-in) ───────────────────────────
  # Only runs when the "seed" profile is active:
  #   docker compose --profile seed up --build
  #
  # Generates enterprise demo scenarios (finance, ecommerce) and loads
  # them into FalkorDB. Skips if data already exists (use SEED_FORCE=true
  # to re-seed).
  seed:
    profiles: ["seed"]
    build:
      context: .
      dockerfile: backend/Dockerfile.seed
    environment:
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: "6379"
      FALKORDB_GRAPH_NAME: nexus_lineage
      SEED_SCENARIOS: finance,ecommerce       # finance | hr | marketing | ecommerce | all
      SEED_SCALE: "1"                         # 1 = ~1k nodes per scenario
      SEED_BREADTH: "1"                       # parallel system chains
      SEED_DEPTH: "1"                         # transformation layers
      # SEED_FORCE: "true"                    # uncomment to re-seed on every run
    depends_on:
      falkordb:
        condition: service_healthy
    restart: "no"

volumes:
  falkordb_data:
  redis_data:
  postgres_data:
