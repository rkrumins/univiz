[alembic]
# Dedicated migration lineage for the **Graph Store DB** — completely
# separate from backend/alembic.ini (which owns the management DB). The
# two databases are provisioned and migrated independently.
script_location = alembic_graph_store

# Naming template for new revisions (same convention as the management
# lineage).
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Timezone for revision generation timestamps.
timezone = UTC

# Connection URL is resolved at runtime by env.py from GRAPH_STORE_DB_URL.
# Leave blank — anything here would be ignored.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
