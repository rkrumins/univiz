# ══════════════════════════════════════════════════════════════════════
# Synodic — Dev Overlay
# ══════════════════════════════════════════════════════════════════════
#
# Merges with docker-compose.yml to add bind-mounted source and hot-reload
# to the app services. Infra (postgres / redis / falkordb) is inherited
# unchanged — the explicit `name:` on volumes below just pins the dev
# data to separate Docker volumes so a dev stack cannot clobber a prod
# stack that happens to share the host.
#
# Usage:
#   docker compose --env-file .env.dev \
#     -f docker-compose.yml -f docker-compose.dev.yml up -d
# (or just `./dev.sh up`)
# ══════════════════════════════════════════════════════════════════════

name: synodic-dev

services:

  # Infra — stable container names so `docker exec synodic-postgres-dev …`
  # and the preflight library work without guessing the compose-generated
  # name. Safe because this stack is always project `synodic-dev`.
  postgres:
    container_name: synodic-postgres-dev

  redis:
    container_name: synodic-redis-dev

  falkordb:
    container_name: synodic-falkordb-dev

  viz-service:
    volumes:
      - ./backend:/app/backend
    command:
      - uvicorn
      - backend.app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/backend
    environment:
      # Single-process dev mode: aggregation runs in-process, no proxy
      # hop to the controlplane. Overrides the prod values.
      SYNODIC_ROLE: dev
      AGGREGATION_PROXY_ENABLED: "false"
      AGGREGATION_DISPATCH_MODE: inprocess

  aggregation-controlplane:
    volumes:
      - ./backend:/app/backend
    # No --reload: the controlplane is a plain `python -m ...` entry
    # point, not a uvicorn app we can hand --reload to. On code change
    # run:  ./dev.sh restart aggregation-controlplane

  aggregation-worker:
    volumes:
      - ./backend:/app/backend
    # Same: `./dev.sh restart aggregation-worker` picks up changes.

  stats-service:
    volumes:
      - ./backend:/app/backend
    # No --reload (headless process, not a uvicorn app). Pick up
    # code changes with:  ./dev.sh restart stats-service

  graph-service:
    volumes:
      - ./backend:/app/backend
    command:
      - uvicorn
      - backend.graph.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --reload
      - --reload-dir
      - /app/backend

  frontend:
    build:
      target: development
    command:
      - npm
      - run
      - dev
      - --
      - --host
      - 0.0.0.0
      - --port
      - "5173"
    ports:
      # Override prod's 3080:80 with vite's 5173:5173
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - ./docs:/docs:ro
      # Anonymous volume shadows host's node_modules (if any) so the
      # container's Linux-built modules win over whatever npm install
      # placed on macOS.
      - /app/node_modules
    environment:
      VITE_PROXY_TARGET: http://viz-service:8000
      VITE_GRAPH_PROXY_TARGET: http://graph-service:8001

volumes:
  # Override the auto-prefixed names (synodic-dev_postgres_data etc.) with
  # stable explicit names. Keeps existing dev volumes in-place across
  # the 780-line-dev.sh → overlay migration.
  postgres_data:
    name: synodic-postgres-dev-data
  redis_data:
    name: synodic-redis-dev-data
  falkordb_data:
    name: synodic-falkordb-dev-data
