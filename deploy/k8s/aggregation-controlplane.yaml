apiVersion: apps/v1
kind: Deployment
metadata:
  name: aggregation-controlplane
  namespace: dataviz
  labels:
    app.kubernetes.io/name: aggregation-controlplane
    app.kubernetes.io/part-of: dataviz
spec:
  # Singleton: owns the aggregation schema, runs Alembic migrations, and is
  # the scheduler. Do not scale > 1.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: aggregation-controlplane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aggregation-controlplane
        app.kubernetes.io/part-of: dataviz
    spec:
      containers:
        - name: aggregation-controlplane
          # Build backend/Dockerfile.controlplane and push to Docker Hub.
          image: docker.io/synodic/aggregation-controlplane:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8091
          envFrom:
            - configMapRef:
                name: dataviz-config
            - secretRef:
                name: dataviz-secrets
          env:
            - name: SYNODIC_ROLE
              value: "controlplane"
            # Short FalkorDB timeout — API responsiveness over completeness.
            - name: FALKORDB_SOCKET_TIMEOUT
              value: "5"
          startupProbe:
            httpGet:
              path: /health
              port: 8091
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8091
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8091
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: aggregation-controlplane
  namespace: dataviz
  labels:
    app.kubernetes.io/name: aggregation-controlplane
    app.kubernetes.io/part-of: dataviz
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aggregation-controlplane
  ports:
    - name: http
      port: 8091
      targetPort: 8091
