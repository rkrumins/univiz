# TEMPLATE ONLY — do NOT commit real secrets.
#
# Preferred: create the Secret imperatively so values never touch git:
#
#   kubectl -n dataviz create secret generic dataviz-secrets \
#     --from-literal=MANAGEMENT_DB_URL='postgresql+asyncpg://synodic:PASS@CLOUDSQL_HOST:5432/synodic' \
#     --from-literal=REDIS_URL='redis://MEMORYSTORE_HOST:6379/0' \
#     --from-literal=JWT_SECRET_KEY="$(openssl rand -hex 48)" \
#     --from-literal=ADMIN_PASSWORD='change-me' \
#     --from-literal=CREDENTIAL_ENCRYPTION_KEY="$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')"
#
# Or edit the REPLACE_ME values below and `kubectl apply -f` this file
# (kustomization.yaml intentionally excludes it).
apiVersion: v1
kind: Secret
metadata:
  name: dataviz-secrets
  namespace: dataviz
  labels:
    app.kubernetes.io/part-of: dataviz
type: Opaque
stringData:
  # Cloud SQL (asyncpg driver). Use the Cloud SQL Auth Proxy sidecar host or
  # private IP. Must include the synodic user/password and synodic database.
  MANAGEMENT_DB_URL: "postgresql+asyncpg://synodic:REPLACE_ME@REPLACE_ME_PG_HOST:5432/synodic"
  # Memorystore for Redis (broker — Redis Streams + pub/sub).
  REDIS_URL: "redis://REPLACE_ME_REDIS_HOST:6379/0"
  # openssl rand -hex 48
  JWT_SECRET_KEY: "REPLACE_ME"
  ADMIN_PASSWORD: "REPLACE_ME"
  # Fernet key. Leave empty string for plaintext (not recommended in prod).
  CREDENTIAL_ENCRYPTION_KEY: ""
  # Admin libpq DSN used ONLY by the dataviz-db-init Job (CREATE ROLE/DATABASE
  # needs privileges; on Cloud SQL this is the 'postgres' superuser).
  DB_INIT_DSN: "postgresql://postgres:REPLACE_ME@REPLACE_ME_PG_HOST:5432/postgres"
