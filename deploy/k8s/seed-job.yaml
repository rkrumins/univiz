# OPT-IN demo-data seeder. Loads enterprise demo scenarios into FalkorDB.
# Intentionally NOT in kustomization.yaml — apply explicitly:
#
#   kubectl apply -f deploy/k8s/seed-job.yaml
#
# Idempotent: the script skips if the graph already has data (set
# SEED_FORCE=true to re-seed). Requires FalkorDB reachable at the
# FALKORDB_HOST/PORT from the dataviz-config ConfigMap.
apiVersion: batch/v1
kind: Job
metadata:
  name: dataviz-seed
  namespace: dataviz
  labels:
    app.kubernetes.io/part-of: dataviz
    app.kubernetes.io/component: seed
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: dataviz
        app.kubernetes.io/component: seed
    spec:
      restartPolicy: Never
      containers:
        - name: seed
          # Build backend/Dockerfile.seed and push to Docker Hub.
          image: docker.io/synodic/seed:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: FALKORDB_HOST
              valueFrom:
                configMapKeyRef:
                  name: dataviz-config
                  key: FALKORDB_HOST
            - name: FALKORDB_PORT
              valueFrom:
                configMapKeyRef:
                  name: dataviz-config
                  key: FALKORDB_PORT
            - name: FALKORDB_GRAPH_NAME
              valueFrom:
                configMapKeyRef:
                  name: dataviz-config
                  key: FALKORDB_GRAPH_NAME
            - name: SEED_SCENARIOS
              value: "finance,ecommerce"
            - name: SEED_SCALE
              value: "1"
            - name: SEED_BREADTH
              value: "1"
            - name: SEED_DEPTH
              value: "1"
