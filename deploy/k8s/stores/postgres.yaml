# In-cluster PostgreSQL (management DB) as a StatefulSet.
# OPT-IN alternative to managed Cloud SQL. The init scripts below create
# the synodic role + 'aggregation' schema on first boot, so the separate
# dataviz-db-init Job is NOT needed when using this.
#
# When used, set in the Secret:
#   MANAGEMENT_DB_URL=postgresql+asyncpg://synodic:<POSTGRES_PASSWORD>@postgres:5432/synodic
# POSTGRES_PASSWORD is read from the dataviz-secrets Secret (add that key).
apiVersion: v1
kind: ConfigMap
metadata:
  name: dataviz-postgres-initdb
  namespace: dataviz
  labels:
    app.kubernetes.io/part-of: dataviz
data:
  01-roles.sql: |
    DO $$
    BEGIN
        IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'synodic') THEN
            CREATE ROLE synodic LOGIN PASSWORD 'synodic';
        END IF;
    END
    $$;

    SELECT 'CREATE DATABASE synodic OWNER synodic'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'synodic')\gexec

    GRANT ALL PRIVILEGES ON DATABASE synodic TO synodic;
  02-schemas.sql: |
    \connect synodic synodic

    CREATE SCHEMA IF NOT EXISTS aggregation AUTHORIZATION synodic;

    GRANT ALL ON SCHEMA public TO synodic;
    GRANT ALL ON SCHEMA aggregation TO synodic;
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: dataviz
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: dataviz
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: dataviz
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: dataviz
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: dataviz
    spec:
      containers:
        - name: postgres
          image: postgres:16.4-alpine
          env:
            - name: POSTGRES_USER
              value: "synodic"
            - name: POSTGRES_DB
              value: "synodic"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dataviz-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_INITDB_ARGS
              value: "--encoding=UTF-8 --locale=C"
            # Subdir keeps initdb off the PVC mount root (lost+found).
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "synodic", "-d", "synodic"]
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "synodic", "-d", "synodic"]
            periodSeconds: 10
            timeoutSeconds: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
      volumes:
        - name: initdb
          configMap:
            name: dataviz-postgres-initdb
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
