apiVersion: apps/v1
kind: Deployment
metadata:
  name: viz-service
  namespace: dataviz
  labels:
    app.kubernetes.io/name: viz-service
    app.kubernetes.io/part-of: dataviz
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: viz-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: viz-service
        app.kubernetes.io/part-of: dataviz
    spec:
      initContainers:
        # Wait for the singleton control plane (it runs Alembic + creates the
        # aggregation schema) before starting — replaces compose depends_on.
        - name: wait-for-controlplane
          image: curlimages/curl:8.10.1
          command:
            - /bin/sh
            - -c
            - "until curl -sf http://aggregation-controlplane:8091/health; do echo waiting for controlplane; sleep 3; done"
      containers:
        - name: viz-service
          # Build backend/Dockerfile.viz and push to Docker Hub. Edit as needed.
          image: docker.io/synodic/viz-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: dataviz-config
            - secretRef:
                name: dataviz-secrets
          env:
            - name: SYNODIC_ROLE
              value: "web"
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: viz-service
  namespace: dataviz
  labels:
    app.kubernetes.io/name: viz-service
    app.kubernetes.io/part-of: dataviz
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: viz-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
