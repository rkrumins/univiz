# Shared non-secret configuration for all dataviz services.
# Mirrors the non-secret env in docker-compose.yml + .env.prod.example.
# Backing stores (Postgres/Redis/FalkorDB) are EXTERNAL/managed — set the
# FalkorDB endpoint below and the DB/Redis URLs in the Secret.
apiVersion: v1
kind: ConfigMap
metadata:
  name: dataviz-config
  namespace: dataviz
  labels:
    app.kubernetes.io/part-of: dataviz
data:
  LOG_LEVEL: "INFO"

  # CORS — set to your real public hostname (matches the ingress host).
  CORS_ALLOWED_ORIGINS: "http://dataviz.example.com"

  # Graph provider bootstrap
  GRAPH_PROVIDER: "falkordb"

  # External FalkorDB endpoint (managed / VM / other cluster). EDIT THIS.
  FALKORDB_HOST: "REPLACE_ME_FALKORDB_HOST"
  FALKORDB_PORT: "6379"
  FALKORDB_GRAPH_NAME: "nexus_lineage"

  # Auth (non-secret parts; JWT_SECRET_KEY/ADMIN_PASSWORD live in the Secret)
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRY_MINUTES: "60"
  ADMIN_EMAIL: "admin@synodic.local"

  # Aggregation control-plane proxy wiring
  AGGREGATION_DISPATCH_MODE: "redis"
  AGGREGATION_PROXY_ENABLED: "true"
  AGGREGATION_SERVICE_URL: "http://aggregation-controlplane:8091"
  AGGREGATION_API_PORT: "8091"

  # Aggregation worker tuning
  WORKER_CONCURRENCY: "4"
  AGGREGATION_JOB_TIMEOUT_SECS: "7200"
  MAX_CONCURRENT_PER_GRAPH: "2"

  # Stats service tuning
  STATS_SCHEDULER_TICK_SECS: "30"
  STATS_WORKER_CONCURRENCY: "2"
  STATS_MAX_CONCURRENT_PER_GRAPH: "1"
  STATS_DEFAULT_INTERVAL_SECS: "300"
  STATS_MIN_INTERVAL_SECS: "60"
  STATS_MAX_DELIVERY_ATTEMPTS: "3"
  STATS_DRAIN_TIMEOUT_SECS: "60"
  STATS_HEALTH_PORT: "8092"
  STATS_POLL_TIMEOUT_SECS: "30"
  STATS_POLL_TIMEOUT_LARGE_SECS: "600"
  STATS_POLL_LARGE_THRESHOLD: "100000"
