apiVersion: apps/v1
kind: Deployment
metadata:
  name: graph-service
  namespace: dataviz
  labels:
    app.kubernetes.io/name: graph-service
    app.kubernetes.io/part-of: dataviz
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: graph-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: graph-service
        app.kubernetes.io/part-of: dataviz
    spec:
      containers:
        - name: graph-service
          # Build backend/Dockerfile.graph and push to Docker Hub. Edit as needed.
          image: docker.io/synodic/graph-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
          envFrom:
            - configMapRef:
                name: dataviz-config
          startupProbe:
            httpGet:
              path: /health
              port: 8001
            periodSeconds: 5
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: graph-service
  namespace: dataviz
  labels:
    app.kubernetes.io/name: graph-service
    app.kubernetes.io/part-of: dataviz
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: graph-service
  ports:
    - name: http
      port: 8001
      targetPort: 8001
