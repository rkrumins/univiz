apiVersion: apps/v1
kind: Deployment
metadata:
  name: aggregation-controlplane
  labels:
    {{- include "dataviz.labels" . | nindent 4 }}
    app.kubernetes.io/name: aggregation-controlplane
spec:
  # Singleton: owns the aggregation schema + Alembic migrations + scheduler.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: aggregation-controlplane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aggregation-controlplane
        app.kubernetes.io/part-of: dataviz
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: aggregation-controlplane
          image: {{ include "dataviz.image" (dict "ctx" $ "name" "aggregation-controlplane") | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8091
          envFrom:
            - configMapRef:
                name: dataviz-config
            - secretRef:
                name: {{ include "dataviz.secretName" . }}
          env:
            - name: SYNODIC_ROLE
              value: "controlplane"
            - name: FALKORDB_SOCKET_TIMEOUT
              value: "5"
          startupProbe:
            httpGet:
              path: /health
              port: 8091
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8091
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8091
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.services.controlplane.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: aggregation-controlplane
  labels:
    {{- include "dataviz.labels" . | nindent 4 }}
    app.kubernetes.io/name: aggregation-controlplane
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aggregation-controlplane
  ports:
    - name: http
      port: 8091
      targetPort: 8091
