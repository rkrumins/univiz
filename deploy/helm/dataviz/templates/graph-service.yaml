apiVersion: apps/v1
kind: Deployment
metadata:
  name: graph-service
  labels:
    {{- include "dataviz.labels" . | nindent 4 }}
    app.kubernetes.io/name: graph-service
spec:
  replicas: {{ .Values.services.graph.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: graph-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: graph-service
        app.kubernetes.io/part-of: dataviz
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: graph-service
          image: {{ include "dataviz.image" (dict "ctx" $ "name" "graph-service") | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8001
          envFrom:
            - configMapRef:
                name: dataviz-config
          startupProbe:
            httpGet:
              path: /health
              port: 8001
            periodSeconds: 5
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.services.graph.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: graph-service
  labels:
    {{- include "dataviz.labels" . | nindent 4 }}
    app.kubernetes.io/name: graph-service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: graph-service
  ports:
    - name: http
      port: 8001
      targetPort: 8001
