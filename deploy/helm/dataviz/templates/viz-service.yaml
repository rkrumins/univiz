apiVersion: apps/v1
kind: Deployment
metadata:
  name: viz-service
  labels:
    {{- include "dataviz.labels" . | nindent 4 }}
    app.kubernetes.io/name: viz-service
spec:
  replicas: {{ .Values.services.viz.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: viz-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: viz-service
        app.kubernetes.io/part-of: dataviz
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.ordering.enabled }}
      initContainers:
        {{- include "dataviz.waitForControlplane" . | nindent 8 }}
      {{- end }}
      containers:
        - name: viz-service
          image: {{ include "dataviz.image" (dict "ctx" $ "name" "viz-service") | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: dataviz-config
            - secretRef:
                name: {{ include "dataviz.secretName" . }}
          env:
            - name: SYNODIC_ROLE
              value: "web"
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.services.viz.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: viz-service
  labels:
    {{- include "dataviz.labels" . | nindent 4 }}
    app.kubernetes.io/name: viz-service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: viz-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
