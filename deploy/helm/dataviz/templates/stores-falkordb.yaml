{{- if .Values.stores.falkordb.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: falkordb
  labels:
    {{- include "dataviz.labels" . | nindent 4 }}
    app.kubernetes.io/name: falkordb
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: falkordb
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
    - name: ui
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: falkordb
  labels:
    {{- include "dataviz.labels" . | nindent 4 }}
    app.kubernetes.io/name: falkordb
spec:
  serviceName: falkordb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: falkordb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: falkordb
        app.kubernetes.io/part-of: dataviz
    spec:
      containers:
        - name: falkordb
          image: {{ .Values.stores.falkordb.image | quote }}
          env:
            - name: FALKORDB_ARGS
              value: "THREAD_COUNT 4"
          ports:
            - name: redis
              containerPort: 6379
            - name: ui
              containerPort: 3000
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 10
            timeoutSeconds: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/falkordb/data
          resources:
            {{- toYaml .Values.stores.falkordb.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.stores.falkordb.storage | quote }}
{{- end }}
