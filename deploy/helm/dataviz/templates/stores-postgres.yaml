{{- if .Values.stores.postgres.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: dataviz-postgres-initdb
  labels:
    {{- include "dataviz.labels" . | nindent 4 }}
data:
  01-roles.sql: |
    DO $$
    BEGIN
        IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'synodic') THEN
            CREATE ROLE synodic LOGIN PASSWORD 'synodic';
        END IF;
    END
    $$;

    SELECT 'CREATE DATABASE synodic OWNER synodic'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'synodic')\gexec

    GRANT ALL PRIVILEGES ON DATABASE synodic TO synodic;
  02-schemas.sql: |
    \connect synodic synodic

    CREATE SCHEMA IF NOT EXISTS aggregation AUTHORIZATION synodic;

    GRANT ALL ON SCHEMA public TO synodic;
    GRANT ALL ON SCHEMA aggregation TO synodic;
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    {{- include "dataviz.labels" . | nindent 4 }}
    app.kubernetes.io/name: postgres
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels:
    {{- include "dataviz.labels" . | nindent 4 }}
    app.kubernetes.io/name: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: dataviz
    spec:
      containers:
        - name: postgres
          image: {{ .Values.stores.postgres.image | quote }}
          env:
            - name: POSTGRES_USER
              value: "synodic"
            - name: POSTGRES_DB
              value: "synodic"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "dataviz.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_INITDB_ARGS
              value: "--encoding=UTF-8 --locale=C"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "synodic", "-d", "synodic"]
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "synodic", "-d", "synodic"]
            periodSeconds: 10
            timeoutSeconds: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          resources:
            {{- toYaml .Values.stores.postgres.resources | nindent 12 }}
      volumes:
        - name: initdb
          configMap:
            name: dataviz-postgres-initdb
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.stores.postgres.storage | quote }}
{{- end }}
